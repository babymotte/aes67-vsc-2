[global]
# Use the ordinary clock (OC) mode: sync the NIC's PHC to the master
twoStepFlag         1
clientOnly          1
time_stamping       hardware
# Transport over Layer 2 (Ethernet) is typical for AES67; set to UDPv4 if needed
network_transport   UDPv4
delay_mechanism     E2E
# Domain number — must match your PTP master (AES67 usually uses 0 or 127)
domainNumber        0
# Logging options
verbose             1
logging_level       6
priority1           255
priority2           255
